<style>

  .article blockquote { border-left: 3px solid #4f6bed; padding: .5rem 0 .5rem 1rem; margin: 1rem 0; color:#475569; background:#f8fafc; border-radius: 0 6px 6px 0;}

<!-- COMMENTS -->
<section class="max-w-3xl mx-auto px-6 pb-16">

      <script src="https://giscus.app/client.js"
        data-repo="shijiyun0629-prog/cross-border-academy"
        data-repo-id="R_kgDOTXebJA"
        data-category="Announcements"
        data-category-id="DIC_kwDOTXebJM4DBIZV"

  </div>
</footer>

<script>
// Parse query
const params = new URLSearchParams(location.search);
const file   = params.get('file');
const loadingEl = document.getElementById('loadingState');
const errorEl   = document.getElementById('errorState');
const articleEl = document.getElementById('articleBody');

async function loadArticle(){
  if(!file){
    showError('缺少参数：请通过 <code>?file=notes/xxx.md</code> 打开文章');
    return;
  }
  // Safety: only allow .md files inside notes/ folder
  if(!/^notes\/[\w\-\.\u4e00-\u9fa5]+\.md$/i.test(file)){
    showError('非法文件路径。只允许加载 notes/ 目录下的 .md 文件。');
    return;
  }
  try {
    const res = await fetch(file);
    if(!res.ok) throw new Error('文件不存在或无法读取（HTTP ' + res.status + '）');
    const md = await res.text();

    // Parse front-matter (optional): first block between --- --- lines
    let meta = {};
    let body = md;
    const fm = md.match(/^---\n([\s\S]+?)\n---\n?([\s\S]*)$/);
    if(fm){
      fm[1].split('\n').forEach(line => {
        const m = line.match(/^(\w+):\s*(.+)$/);
        if(m) meta[m[1].trim()] = m[2].trim().replace(/^["']|["']$/g,'');
      });
      body = fm[2];
    }

    // Render
    articleEl.innerHTML = marked.parse(body);
    articleEl.classList.remove('hidden');
    loadingEl.classList.add('hidden');
    document.title = (meta.title || file.split('/').pop().replace('.md','')) + ' · Cross-Border Academy';
  } catch(err) {
    showError('加载失败：' + err.message + '<br><br><span class="text-xs">如果你正在双击本地文件打开，浏览器安全策略会阻止读取本地文件——这是正常的。等 30 分钟后我们部署到 Vercel，就能正常访问了。</span>');
  }
}

function showError(msg){
  loadingEl.classList.add('hidden');
  errorEl.classList.remove('hidden');
  errorEl.innerHTML = msg;
}

loadArticle();
</script>
</body>
</html>
